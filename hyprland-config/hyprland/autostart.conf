# Autostart Applications

# Authentication agent
exec-once = /run/current-system/sw/libexec/polkit-kde-authentication-agent-1

# Status bar
exec-once = waybar

# Wallpaper
exec-once = hyprpaper

# Notifications
exec-once = dunst

# Network applet
exec-once = nm-applet --indicator

# Bluetooth applet
# exec-once = blueman-applet

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle management and screen locking
exec-once = swayidle -w timeout 300 'swaylock -f' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'swaylock -f'

# Your custom autostart applications
# exec-once = discord --start-minimized
# exec-once = steam -silent
# exec-once = easyeffects --gapplication-service
