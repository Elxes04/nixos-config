# Hyprland Configuration
# See https://wiki.hyprland.org/Configuring/

# Source external configs
source = ~/.config/hypr/style.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

# Input configuration
input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = 1
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# General settings
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    
    # Neon gradient border for active windows
    col.active_border = $border_active_start $border_active_end 45deg
    col.inactive_border = $border_inactive

    layout = dwindle
    
    allow_tearing = false
    
    resize_on_border = true
    extend_border_grab_area = 15
}

# Decoration
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        
        vibrancy = 0.2
        vibrancy_darkness = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        sharp = false
        color = $shadow
        color_inactive = $shadow_inactive
        offset = 0 2
        scale = 1.0
    }
    
    # Dim inactive windows
    dim_inactive = true
    dim_strength = 0.08
    dim_special = 0.4
}

# Animations
animations {
    enabled = true

    # Bezier curves for smooth, modern animations
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = bounce, 1, 1.6, 0.1, 0.85
    bezier = linear, 0, 0, 1, 1

    # Window animations
    animation = windowsIn, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, overshot, slide
    
    # Border animations
    animation = border, 1, 10, linear
    animation = borderangle, 1, 100, linear, loop
    
    # Fade animations
    animation = fadeIn, 1, 5, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = fadeSwitch, 1, 5, smoothIn
    animation = fadeShadow, 1, 5, smoothIn
    animation = fadeDim, 1, 8, smoothIn
    
    # Workspace animations
    animation = workspaces, 1, 6, overshot, slide
    animation = specialWorkspace, 1, 5, overshot, slidevert
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    special_scale_factor = 0.95
    force_split = 2
}

master {
    new_status = master
    new_on_top = true
    mfact = 0.5
    orientation = left
    inherit_fullscreen = true
}

# Gestures
gestures {
    # Note: workspace_swipe is now configured via gesture binds
    # See binds.conf for: gesture 3, horizontal, workspace
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    allow_session_lock_restore = true
}

# Device specific configs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
