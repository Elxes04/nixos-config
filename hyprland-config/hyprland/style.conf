# ====================================================================
# Modern Hyprland Style Configuration
# Custom "Cyber Synthwave" Theme - A modern dark theme with neon accents
# ====================================================================

# Color Palette - Cyber Synthwave
$bg_dark = rgb(0a0e1a)           # Deep dark background
$bg_normal = rgb(13172b)         # Normal background
$bg_light = rgb(1a2332)          # Light background variant
$fg = rgb(e6e6fa)                # Foreground/text color (lavender white)

# Accent Colors - Neon Synthwave
$accent_primary = rgb(00d9ff)    # Bright cyan (main accent)
$accent_secondary = rgb(bd00ff)  # Vivid purple (secondary)
$accent_tertiary = rgb(ff006e)   # Hot pink (highlights)
$accent_success = rgb(00ff9f)    # Neon green
$accent_warning = rgb(ffbd00)    # Gold/amber
$accent_error = rgb(ff0055)      # Bright red

# UI Element Colors
$border_active_start = $accent_primary
$border_active_end = $accent_secondary
$border_inactive = rgb(2a3341)

$shadow = rgba(0a0e1aee)
$shadow_inactive = rgba(0a0e1a99)
