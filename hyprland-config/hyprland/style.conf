# ====================================================================
# Modern Hyprland Style Configuration
# Custom "ThinkPad" Theme - Classic black and red ThinkPad aesthetic
# ====================================================================

# Color Palette - ThinkPad
$bg_dark = rgb(0a0a0a)           # Deep black background
$bg_normal = rgb(1a1a1a)         # Normal black background
$bg_light = rgb(2a2a2a)          # Light black variant
$fg = rgb(e0e0e0)                # Foreground/text color (light gray)

# Accent Colors - ThinkPad Red
$accent_primary = rgb(ee1111)    # ThinkPad red (main accent)
$accent_secondary = rgb(cc0000)  # Dark red (secondary)
$accent_tertiary = rgb(ff3333)   # Bright red (highlights)
$accent_success = rgb(00cc00)    # Green
$accent_warning = rgb(ff9900)    # Orange
$accent_error = rgb(ee1111)      # ThinkPad red for errors

# UI Element Colors
$border_active_start = $accent_primary
$border_active_end = $accent_tertiary
$border_inactive = rgb(3a3a3a)

$shadow = rgba(000000ee)
$shadow_inactive = rgba(00000099)
