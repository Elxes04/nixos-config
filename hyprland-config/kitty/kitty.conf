# Kitty Terminal Configuration
# Cyber Synthwave Theme matching Hyprland

# Font configuration
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# Cursor
cursor_shape     beam
cursor_beam_thickness 2
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait 3.0
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
copy_on_select yes
strip_trailing_spaces smart

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "🔔 "

# Window layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 700
window_padding_width 12
placement_strategy center

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# Color scheme - Cyber Synthwave
foreground #e6e6fa
background #0a0e1a
background_opacity 0.95
background_blur 20

selection_foreground #0a0e1a
selection_background #00d9ff

# Cursor colors
cursor #00d9ff
cursor_text_color #0a0e1a

# URL underline color
url_color #bd00ff

# Tab bar colors
active_tab_foreground   #0a0e1a
active_tab_background   #00d9ff
inactive_tab_foreground #7a8ba3
inactive_tab_background #13172b
tab_bar_background      #0a0e1a

# Normal colors
color0  #0a0e1a
color1  #ff0055
color2  #00ff9f
color3  #ffbd00
color4  #00d9ff
color5  #bd00ff
color6  #00d9ff
color7  #e6e6fa

# Bright colors
color8  #2a3341
color9  #ff006e
color10 #00ff9f
color11 #ffbd00
color12 #00d9ff
color13 #bd00ff
color14 #7dcfff
color15 #ffffff

# Marks
mark1_foreground #0a0e1a
mark1_background #00d9ff
mark2_foreground #0a0e1a
mark2_background #bd00ff
mark3_foreground #0a0e1a
mark3_background #ff006e

# Advanced
shell .
editor .
close_on_child_death no
confirm_os_window_close 0
allow_remote_control yes
update_check_interval 0
clipboard_control write-clipboard write-primary read-clipboard read-primary

# OS specific
linux_display_server wayland

# Keyboard shortcuts
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection

# Scrolling
map kitty_mod+up scroll_line_up
map kitty_mod+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end

# Window management
map kitty_mod+enter new_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window

# Tab management
map kitty_mod+t new_tab
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab

# Font sizes
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+backspace change_font_size all 0

# Misc
map kitty_mod+f11 toggle_fullscreen
map kitty_mod+u kitten unicode_input
